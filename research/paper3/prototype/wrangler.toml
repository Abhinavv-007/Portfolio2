name = "glass-ballot-box"
compatibility_date = "2024-03-20"
main = "src/index.js"

# Serve static files from the /public directory locally and on Cloudflare Pages
[site]
bucket = "./public"

[[d1_databases]]
binding = "DB"
database_name = "glass-ballot-db"
database_id = "00000000-0000-0000-0000-000000000000" # We will replace this when we create the DB
